apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: demo-project
  source:
    repoURL: https://github.com/Wsangsrichan/gitops-argocd.git
    targetRevision: main
    path: apps/nginx-demo/base
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-demo
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
